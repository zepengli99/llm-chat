<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>LLM Chat API Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Consolas', 'Menlo', monospace;
      background: #141414; color: #ccc;
      display: flex; height: 100vh; overflow: hidden;
    }

    /* ── Left panel ── */
    #left {
      width: 54%; padding: 14px; overflow-y: auto;
      border-right: 1px solid #2a2a2a;
      display: flex; flex-direction: column; gap: 12px;
    }

    .section {
      background: #1e1e1e; border: 1px solid #2e2e2e;
      border-radius: 5px; padding: 12px;
    }
    .section h3 {
      margin: 0 0 10px; font-size: 12px; text-transform: uppercase;
      letter-spacing: .08em; color: #666;
    }

    .row { display: flex; gap: 7px; margin-bottom: 7px; align-items: flex-start; }

    input[type=text], input[type=email], input[type=password], textarea {
      background: #111; border: 1px solid #383838; color: #ddd;
      padding: 6px 8px; border-radius: 3px;
      font-family: inherit; font-size: 13px; flex: 1; min-width: 0;
    }
    input:focus, textarea:focus { outline: none; border-color: #4a7fd4; }
    textarea { resize: vertical; min-height: 64px; }

    button {
      background: #2a5298; color: #e8e8e8; border: none;
      padding: 6px 13px; border-radius: 3px; cursor: pointer;
      font-family: inherit; font-size: 12px; white-space: nowrap;
      flex-shrink: 0;
    }
    button:hover { background: #3660b8; }
    button.sm { padding: 4px 9px; font-size: 11px; }
    button.danger { background: #5c1f1f; }
    button.danger:hover { background: #7a2a2a; }
    button.secondary { background: #2e2e2e; }
    button.secondary:hover { background: #3a3a3a; }

    .resp {
      background: #0e0e0e; border: 1px solid #2a2a2a;
      padding: 8px; border-radius: 3px; font-size: 12px;
      max-height: 180px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-all;
      margin-top: 6px; display: none;
    }
    .resp.error { color: #e05555; }
    .resp.ok { color: #999; }

    /* token status */
    #token-status {
      font-size: 11px; color: #555; margin-top: 6px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #token-status.ok { color: #4a9; }

    /* chat messages */
    #chat-messages {
      background: #0e0e0e; border: 1px solid #2a2a2a;
      padding: 8px; border-radius: 3px;
      min-height: 90px; max-height: 260px; overflow-y: auto;
      font-size: 13px; margin-bottom: 8px;
    }
    .msg { margin: 3px 0; line-height: 1.5; }
    .msg-user { color: #6a9fd8; }
    .msg-user::before { content: "you  ▸ "; color: #446; }
    .msg-assistant { color: #7ed47e; }
    .msg-assistant::before { content: "bot  ▸ "; color: #264; }

    /* history list */
    #history-list {
      max-height: 200px; overflow-y: auto;
      border: 1px solid #2a2a2a; border-radius: 3px;
      margin-top: 6px;
    }
    .conv-item {
      padding: 7px 10px; border-bottom: 1px solid #222;
      cursor: pointer; transition: background .1s;
    }
    .conv-item:last-child { border-bottom: none; }
    .conv-item:hover { background: #252525; }
    .conv-title { font-size: 13px; color: #8ab4f8; }
    .conv-meta { font-size: 11px; color: #555; margin-top: 2px; }

    /* ── Right panel — logs ── */
    #right {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    #log-header {
      padding: 8px 14px; background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    #log-header span { font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: .07em; }
    #log-status { font-size: 11px; color: #555; }
    #log-status.connected { color: #4a9; }
    #log-panel {
      flex: 1; overflow-y: auto; padding: 6px 10px; font-size: 11.5px; line-height: 1.6;
    }
    .log-entry { border-bottom: 1px solid #1c1c1c; padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
    .log-INFO    { color: #888; }
    .log-WARNING { color: #d4a843; }
    .log-ERROR   { color: #e05555; }
    .log-CRITICAL{ color: #ff4444; font-weight: bold; }
    .log-DEBUG   { color: #555; }
    .log-time    { color: #444; margin-right: 4px; }
    .log-level   { display: inline-block; width: 7ch; }
    .log-name    { color: #556; margin-right: 4px; }
  </style>
</head>
<body>

<!-- ═══════════════ LEFT PANEL ═══════════════ -->
<div id="left">

  <!-- Auth -->
  <div class="section">
    <h3>Auth</h3>
    <div class="row">
      <input type="email" id="reg-email" placeholder="email">
      <input type="password" id="reg-password" placeholder="password (min 8)">
      <button onclick="register()">Register</button>
    </div>
    <div class="row">
      <input type="email" id="login-email" placeholder="email">
      <input type="password" id="login-password" placeholder="password">
      <button onclick="login()">Login</button>
      <button class="secondary sm" onclick="clearToken()">Clear</button>
    </div>
    <div id="token-status">No token</div>
    <div id="auth-resp" class="resp"></div>
  </div>

  <!-- Chat -->
  <div class="section">
    <h3>Chat</h3>
    <div id="chat-messages"></div>
    <div class="row">
      <input type="text" id="conv-id" placeholder="conversation_id (empty = new conversation)">
      <button class="secondary sm" onclick="document.getElementById('conv-id').value=''">New</button>
    </div>
    <div class="row">
      <textarea id="chat-input" placeholder="Message… (Ctrl+Enter to send)"></textarea>
      <button onclick="sendMessage()">Send</button>
    </div>
    <div id="chat-resp" class="resp"></div>
  </div>

  <!-- History -->
  <div class="section">
    <h3>History</h3>
    <div class="row">
      <button onclick="fetchHistory()">Load conversations</button>
      <input type="text" id="detail-conv-id" placeholder="conversation_id">
      <button onclick="fetchDetail()">Load detail</button>
    </div>
    <div id="history-list"></div>
    <div id="history-resp" class="resp"></div>
  </div>

</div>

<!-- ═══════════════ RIGHT PANEL — LOGS ═══════════════ -->
<div id="right">
  <div id="log-header">
    <span>Logs</span>
    <div style="display:flex;gap:10px;align-items:center">
      <span id="log-status">disconnected</span>
      <button class="danger sm" onclick="clearLogs()">Clear</button>
    </div>
  </div>
  <div id="log-panel"></div>
</div>

<script>
const BASE = 'http://localhost:8000';
let token = localStorage.getItem('llm_token') || '';
updateTokenStatus();

// ── helpers ──────────────────────────────────────────────────────────────────

function updateTokenStatus() {
  const el = document.getElementById('token-status');
  if (token) {
    el.className = 'ok';
    el.textContent = 'Token: ' + token.slice(0, 48) + '…';
  } else {
    el.className = '';
    el.textContent = 'No token';
  }
}

function showResp(id, data, isError) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  el.className = 'resp ' + (isError ? 'error' : 'ok');
  el.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
}

function hideResp(id) {
  document.getElementById(id).style.display = 'none';
}

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
}

// ── auth ─────────────────────────────────────────────────────────────────────

async function register() {
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  try {
    const r    = await fetch(BASE + '/auth/register', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await r.json();
    showResp('auth-resp', data, !r.ok);
  } catch (e) { showResp('auth-resp', e.message, true); }
}

async function login() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  try {
    const r    = await fetch(BASE + '/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await r.json();
    showResp('auth-resp', data, !r.ok);
    if (r.ok && data.access_token) {
      token = data.access_token;
      localStorage.setItem('llm_token', token);
      updateTokenStatus();
    }
  } catch (e) { showResp('auth-resp', e.message, true); }
}

function clearToken() {
  token = '';
  localStorage.removeItem('llm_token');
  updateTokenStatus();
  hideResp('auth-resp');
}

// ── chat ─────────────────────────────────────────────────────────────────────

function appendMsg(role, text) {
  const wrap = document.getElementById('chat-messages');
  const div  = document.createElement('div');
  div.className = 'msg msg-' + role;
  div.textContent = text;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

async function sendMessage() {
  if (!token) { showResp('chat-resp', 'No token — please login first', true); return; }
  const message = document.getElementById('chat-input').value.trim();
  if (!message) return;
  const conv_id = document.getElementById('conv-id').value.trim() || null;

  appendMsg('user', message);
  document.getElementById('chat-input').value = '';
  hideResp('chat-resp');

  const assistantDiv = appendMsg('assistant', '▌');
  let buf = '';

  try {
    const r = await fetch(BASE + '/chat', {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({ message, conversation_id: conv_id }),
    });

    if (!r.ok) {
      const err = await r.json();
      showResp('chat-resp', err, true);
      assistantDiv.remove();
      return;
    }

    const reader  = r.body.getReader();
    const decoder = new TextDecoder();
    let raw = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      raw += decoder.decode(value, { stream: true });
      const lines = raw.split('\n');
      raw = lines.pop(); // keep incomplete line
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const obj = JSON.parse(line.slice(6));
          if (obj.token !== undefined) {
            buf += obj.token;
            assistantDiv.textContent = buf + '▌';
            document.getElementById('chat-messages').scrollTop = 99999;
          } else if (obj.done && obj.conversation_id) {
            document.getElementById('conv-id').value = obj.conversation_id;
            assistantDiv.textContent = buf;
          } else if (obj.error) {
            showResp('chat-resp', obj.error, true);
          }
        } catch {}
      }
    }
    assistantDiv.textContent = buf; // ensure cursor removed
  } catch (e) {
    showResp('chat-resp', e.message, true);
    assistantDiv.remove();
  }
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) sendMessage();
});

// ── history ───────────────────────────────────────────────────────────────────

async function fetchHistory() {
  if (!token) { showResp('history-resp', 'No token', true); return; }
  try {
    const r    = await fetch(BASE + '/chat/history', { headers: authHeaders() });
    const data = await r.json();
    if (!r.ok) { showResp('history-resp', data, true); return; }
    hideResp('history-resp');

    const list = document.getElementById('history-list');
    list.innerHTML = '';
    if (!data.length) {
      list.innerHTML = '<div style="padding:8px;color:#555;font-size:12px">No conversations yet</div>';
      return;
    }
    data.forEach(conv => {
      const div = document.createElement('div');
      div.className = 'conv-item';
      div.innerHTML =
        '<div class="conv-title">' + (conv.title || '(no title)') + '</div>' +
        '<div class="conv-meta">' + conv.id + '  ·  ' + new Date(conv.updated_at).toLocaleString() + '</div>';
      div.onclick = () => {
        document.getElementById('detail-conv-id').value = conv.id;
        document.getElementById('conv-id').value = conv.id;
        fetchDetail();
      };
      list.appendChild(div);
    });
  } catch (e) { showResp('history-resp', e.message, true); }
}

async function fetchDetail() {
  if (!token) { showResp('history-resp', 'No token', true); return; }
  const conv_id = document.getElementById('detail-conv-id').value.trim();
  if (!conv_id) return;
  try {
    const r    = await fetch(BASE + '/chat/history/' + conv_id, { headers: authHeaders() });
    const data = await r.json();
    showResp('history-resp', data, !r.ok);
  } catch (e) { showResp('history-resp', e.message, true); }
}

// ── logs ──────────────────────────────────────────────────────────────────────

function clearLogs() { document.getElementById('log-panel').innerHTML = ''; }

function connectLogs() {
  const statusEl = document.getElementById('log-status');
  const panel    = document.getElementById('log-panel');

  const es = new EventSource(BASE + '/logs/stream');

  es.onopen = () => {
    statusEl.textContent = 'connected';
    statusEl.className = 'connected';
  };

  es.onmessage = e => {
    let entry;
    try { entry = JSON.parse(e.data); } catch { return; }

    const div   = document.createElement('div');
    div.className = 'log-entry log-' + entry.level;
    div.innerHTML =
      '<span class="log-time">' + entry.time + '</span>' +
      '<span class="log-level log-' + entry.level + '">' + entry.level + '</span> ' +
      '<span class="log-name">' + entry.name + '</span>' +
      entry.message;
    panel.appendChild(div);
    panel.scrollTop = panel.scrollHeight;
  };

  es.onerror = () => {
    statusEl.textContent = 'reconnecting…';
    statusEl.className = '';
    // EventSource retries automatically
  };
}

connectLogs();
</script>
</body>
</html>
